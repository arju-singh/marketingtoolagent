name: Deploy (Vercel)

# Activates only when the VERCEL_* repo secrets are set; otherwise it no-ops.
# Add in GitHub → Settings → Secrets → Actions:
#   VERCEL_TOKEN       (Vercel → Account → Tokens)
#   VERCEL_ORG_ID      (from `.vercel/project.json` after `vercel link`)
#   VERCEL_PROJECT_ID  (same file)
on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - name: Gate on token
        id: gate
        run: echo "have=${{ secrets.VERCEL_TOKEN != '' }}" >> "$GITHUB_OUTPUT"
      - if: steps.gate.outputs.have == 'true'
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - name: Deploy to production
        if: steps.gate.outputs.have == 'true'
        run: npx --yes vercel deploy --prod --yes --token="${{ secrets.VERCEL_TOKEN }}"
      - name: Skipped
        if: steps.gate.outputs.have != 'true'
        run: echo "VERCEL_TOKEN not set — skipping deploy."
