name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install client
        run: npm --prefix client ci || npm --prefix client install

      - name: Install server
        run: npm --prefix server ci || npm --prefix server install

      - name: Typecheck + build client
        run: npm --prefix client run build

      - name: Typecheck server
        run: npm --prefix server run typecheck

      - name: Payment webhook smoke test
        env:
          RAZORPAY_WEBHOOK_SECRET: testsecret
          RAZORPAY_KEY_ID: rzp_test_ci
          RAZORPAY_KEY_SECRET: ci_secret
        run: |
          npm --prefix server start >/tmp/server.log 2>&1 &
          for i in $(seq 1 30); do
            if curl -sf -o /dev/null http://127.0.0.1:8787/api/health; then echo "ready"; break; fi
            sleep 1
          done
          RAZORPAY_WEBHOOK_SECRET=testsecret BASE_URL=http://127.0.0.1:8787 npm run smoke:pay
          kill %1 || true
